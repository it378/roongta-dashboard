<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roongta Group | Executive HO Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --navy: #0f172a; --ebitda: #22c55e; --rev-sub: #fefce8; --exp-sub: #fff1f2; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; font-size: 11px; color: #1e293b; }
        
        /* AUTH OVERLAY */
        #passOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--navy); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .pass-card { background: white; padding: 40px; border-radius: 16px; text-align: center; width: 320px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .pass-card input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #e2e8f0; border-radius: 8px; text-align: center; font-size: 20px; outline: none; }
        
        /* HEADER */
        .ho-header { background: var(--navy); color: white; padding: 25px; border-radius: 16px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .summary-pill { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .pill-label { font-size: 9px; color: #94a3b8; display: block; font-weight: 800; text-transform: uppercase; }
        .pill-val { font-size: 18px; font-weight: 800; }

        /* TABLE STRUCTURE */
        .table-wrap { background: white; padding: 15px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; min-width: 1300px; table-layout: fixed; }
        th { background: #f1f5f9; color: #475569; padding: 12px; text-align: right; font-size: 10px; border-bottom: 2px solid #e2e8f0; }
        td { border-bottom: 1px solid #f1f5f9; padding: 8px; text-align: right; }
        
        .sticky-col { position: sticky; left: 0; background: white !important; font-weight: 700; min-width: 250px; border-right: 2px solid #f1f5f9; z-index: 5; text-align: left !important; }
        input { width: 100%; border: none; text-align: right; font-weight: 700; outline: none; background: transparent; font-size: 13px; color: #334155; }

        /* PROFESSIONAL ROWS */
        .row-cinema-total { background-color: var(--navy) !important; -webkit-print-color-adjust: exact; }
        .row-cinema-total td, .row-cinema-total .sticky-col { color: white !important; background-color: var(--navy) !important; padding: 12px 8px; }
        .row-cinema-total input { color: white !important; font-size: 15px; }

        .group-header { background: #f8fafc; font-weight: 800; color: #64748b; font-size: 10px; }
        .row-rev-total { background: var(--rev-sub) !important; border-top: 1px solid #fef08a; -webkit-print-color-adjust: exact; }
        .row-exp-total { background: var(--exp-sub) !important; border-top: 1px solid #fecaca; -webkit-print-color-adjust: exact; }

        /* FINAL EBITDA ROW - NO OVERLAPPING */
        .row-final-net { background-color: var(--ebitda) !important; -webkit-print-color-adjust: exact; }
        .row-final-net td, .row-final-net .sticky-col { background-color: var(--ebitda) !important; color: white !important; padding: 18px 8px !important; border: none; }
        .row-final-net input { color: white !important; font-size: 22px !important; font-weight: 900 !important; line-height: 1.2; }

        /* PRINT SETTINGS */
        @media print {
            body { padding: 0; background: white; }
            .no-print, button, select, #passOverlay { display: none !important; }
            .table-wrap { box-shadow: none; padding: 0; }
            .ho-header { border: 1px solid #eee; background: var(--navy) !important; color: white !important; }
            .sticky-col { position: relative !important; }
            table { min-width: 100%; width: 100%; }
        }

        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .btn-save { background: #059669; color: white; }
        .btn-print { background: #3b82f6; color: white; margin-left: 8px; }
    </style>
</head>
<body>

<div id="passOverlay">
    <div class="pass-card">
        <h2>HO MASTER ACCESS</h2>
        <input type="password" id="masterPassInput" placeholder="••••" onkeydown="if(event.key==='Enter') checkPass()">
        <button onclick="checkPass()" class="btn btn-save" style="width:100%">UNLOCK DASHBOARD</button>
    </div>
</div>

<div class="ho-header">
    <div style="display: flex; gap: 15px;">
        <div class="summary-pill">
            <span class="pill-label">Cinema EBITDA</span>
            <span id="header-cinemas-total" class="pill-val">₹ 0.00 L</span>
        </div>
        <div class="summary-pill">
            <span class="pill-label">HO Impact (Net)</span>
            <span id="header-ho-total" class="pill-val" style="color: #f19eb5;">₹ 0.00 L</span>
        </div>
        <div class="summary-pill" style="background: var(--ebitda); border: none;">
            <span class="pill-label" style="color: rgba(255,255,255,0.7)">Group Net EBITDA</span>
            <span id="header-final-net" class="pill-val">₹ 0.00 L</span>
        </div>
    </div>
    <div style="text-align: right;">
        <select id="fySelect" onchange="refreshHOData()" style="padding: 8px; border-radius: 6px; font-weight: 700; margin-right: 10px;">
            <option value="2025">FY 2025-26</option>
            <option value="2026">FY 2026-27</option>
        </select>
        <button onclick="saveHO()" class="btn btn-save">SAVE</button>
        <button onclick="window.print()" class="btn btn-print">PRINT / EXPORT PDF</button>
    </div>
</div>

<div class="table-wrap">
    <table>
        <thead><tr id="hRow"></tr></thead>
        <tbody id="tBody"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://roongta-cinemas-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const months = ["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];
    const revenueRows = [{ id: 'rev_bus', label: 'Business Vertical Rev' }, { id: 'rev_vpf', label: 'VPF/Content Rev' }, { id: 'rev_oth_ho', label: 'Other HO Rev' }];
    const expenseRows = [{ id: 'exp_sal', label: 'HO Human Capital' }, { id: 'exp_off', label: 'Office Admin Exp' }, { id: 'exp_oth', label: 'Misc Overheads' }];

    function checkPass() {
        if (document.getElementById('masterPassInput').value === "RCINEMAHO") { 
            document.getElementById('passOverlay').style.display = 'none';
            initHO();
        } else { alert("Wrong Password!"); }
    }

    function initHO() {
        const h = document.getElementById('hRow');
        const b = document.getElementById('tBody');
        h.innerHTML = '<th class="sticky-col">FINANCIAL PARTICULARS</th>' + months.map(m => `<th>${m}</th>`).join('') + '<th>FY TOTAL</th>';
        
        b.innerHTML += renderRow({ id: 'cinema_ebitda', label: 'TOTAL CINEMA OPERATING EBITDA', cls: 'row-cinema-total', isRO: true });
        b.innerHTML += `<tr class="group-header"><td class="sticky-col" colspan="14">ADDITIONAL HO REVENUE STREAMS</td></tr>`;
        revenueRows.forEach(r => b.innerHTML += renderRow(r));
        b.innerHTML += renderRow({ id: 'total_ho_rev', label: 'TOTAL ADDITIONAL REVENUE', cls: 'row-rev-total', isRO: true });
        b.innerHTML += `<tr class="group-header"><td class="sticky-col" colspan="14">HO OPERATING EXPENDITURE</td></tr>`;
        expenseRows.forEach(r => b.innerHTML += renderRow(r));
        b.innerHTML += renderRow({ id: 'total_ho_exp', label: 'TOTAL HO EXPENDITURE', cls: 'row-exp-total', isRO: true });
        b.innerHTML += renderRow({ id: 'final_ebitda', label: 'CONSOLIDATED GROUP EBITDA (NET)', cls: 'row-final-net', isRO: true });
        
        refreshHOData();
    }

    function renderRow(r) {
        let html = `<tr class="${r.cls || ''}"><td class="sticky-col">${r.label}</td>`;
        for(let i=0; i<=12; i++) {
            html += `<td><input type="number" id="${r.id}_${i}" value="0" ${r.isRO || i===12 ? 'readonly':'oninput="calcHO()"'}></td>`;
        }
        return html + '</tr>';
    }

    async function refreshHOData() {
        const fy = document.getElementById('fySelect').value;
        const snapshot = await db.ref('reports').once('value');
        const all = snapshot.val() || {};
        const locations = ['surat', 'ghaziabad', 'muzaffarnagar', 'adipur', 'hyderabad'];

        for (let i = 0; i < 12; i++) {
            let totalCin = 0;
            locations.forEach(loc => {
                const d = all[loc]?.['actual']?.[fy];
                if (d) {
                    const ff = parseFloat(d.ff?.[i] || 0), atp = parseFloat(d.atp_g?.[i] || 0), sph = parseFloat(d.sph_g?.[i] || 0);
                    const core = (ff * (atp + sph)) / 100000;
                    let o = 0; ['rev_oth','rev_3d','rev_park','rev_mgmt','rev_adv'].forEach(k => o += parseFloat(d[k]?.[i] || 0));
                    let e = 0; Object.keys(d).forEach(k => { if(!['ff','atp_g','sph_g','atp_n','sph_n','rev_oth','rev_3d','rev_park','rev_mgmt','rev_adv','cap','occ'].includes(k) && Array.isArray(d[k])) e += parseFloat(d[k][i] || 0); });
                    totalCin += (core + o - e);
                }
            });
            document.getElementById(`cinema_ebitda_${i}`).value = totalCin.toFixed(2);
        }

        const hoSnap = await db.ref(`reports/HO/actual/${fy}`).once('value');
        const hoData = hoSnap.val() || {};
        [...revenueRows, ...expenseRows].forEach(r => {
            if(hoData[r.id]) hoData[r.id].forEach((v, idx) => { if(document.getElementById(`${r.id}_${idx}`)) document.getElementById(`${r.id}_${idx}`).value = v; });
        });
        calcHO();
    }

    function calcHO() {
        for (let i = 0; i <= 12; i++) {
            if (i === 12) {
                ['cinema_ebitda', ...revenueRows.map(r=>r.id), ...expenseRows.map(r=>r.id)].forEach(id => {
                    let sum = 0; for(let m=0; m<12; m++) sum += parseFloat(document.getElementById(`${id}_${m}`).value) || 0;
                    document.getElementById(`${id}_12`).value = sum.toFixed(2);
                });
            }
            let rev = 0; revenueRows.forEach(r => rev += parseFloat(document.getElementById(`${r.id}_${i}`).value) || 0);
            document.getElementById(`total_ho_rev_${i}`).value = rev.toFixed(2);
            let exp = 0; expenseRows.forEach(r => exp += parseFloat(document.getElementById(`${r.id}_${i}`).value) || 0);
            document.getElementById(`total_ho_exp_${i}`).value = exp.toFixed(2);

            const cin = parseFloat(document.getElementById(`cinema_ebitda_${i}`).value) || 0;
            const net = (cin + rev) - exp;
            document.getElementById(`final_ebitda_${i}`).value = net.toFixed(2);

            if (i === 12) {
                document.getElementById('header-cinemas-total').innerText = `₹ ${cin.toFixed(2)} L`;
                // REMOVED MINUS SYMBOL FOR HO IMPACT
                document.getElementById('header-ho-total').innerText = `₹ ${Math.abs(exp - rev).toFixed(2)} L`;
                document.getElementById('header-final-net').innerText = `₹ ${net.toFixed(2)} L`;
            }
        }
    }

    async function saveHO() {
        const fy = document.getElementById('fySelect').value;
        const data = {};
        [...revenueRows, ...expenseRows].forEach(r => {
            data[r.id] = []; for(let i=0; i<12; i++) data[r.id].push(document.getElementById(`${r.id}_${i}`).value || "0");
        });
        await db.ref(`reports/HO/actual/${fy}`).set(data);
        alert("Consolidated Data Saved!");
    }
</script>
</body>
</html>
