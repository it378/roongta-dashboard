<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roongta Group | HO Master Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* Exact theme from Cinema Dashboard */
        :root { --navy: #0f172a; --ebitda: #92d050; --rev-gross: #ffd966; --exp: #f19eb5; --group-yellow: #ffff00; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; font-size: 11px; }
        .ho-header { background: #0f172a; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .table-wrap { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; min-width: 1200px; }
        th { background: #0f172a; color: white; padding: 10px; text-align: left; position: sticky; top: 0; }
        td { border: 1px solid #cbd5e1; padding: 4px; }
        .sticky-col { position: sticky; left: 0; background: white; font-weight: 800; min-width: 240px; border-right: 2px solid #0f172a; z-index: 5; }
        input { width: 100%; border: none; text-align: right; font-weight: 700; outline: none; background: transparent; padding: 4px 0; }
        .calc-field { background: #f1f5f9; color: #475569; }
        .group-header { background: var(--group-yellow); font-weight: 800; cursor: pointer; }
        .h-rev-gross { background: var(--rev-gross); }
        .h-exp { background: var(--exp); }
        .h-ebitda { background: var(--ebitda); }
        .year-col { background: #e0f2fe !important; font-weight: 900; }
        .hidden-row { display: none; }
        .toggle-btn { margin-right: 8px; font-size: 14px; }
    </style>
</head>
<body>

<div class="ho-header" style="display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #0f172a; color: white; border-radius: 12px; margin-bottom: 20px;">
    
    <div style="display: flex; gap: 25px; align-items: center; justify-content: flex-start; flex: 2;">
        <div style="text-align: left; border-right: 1px solid #334155; padding-right: 20px;">
            <span style="font-size: 10px; color: #94a3b8; font-weight: 700; display: block; margin-bottom: 4px;">CINEMAS TOTAL</span>
            <span id="header-cinemas-total" style="font-size: 16px; font-weight: 800; color: white;">₹ 0.00 L</span>
        </div>
        <div style="text-align: left; border-right: 1px solid #334155; padding-right: 20px;">
            <span style="font-size: 10px; color: #94a3b8; font-weight: 700; display: block; margin-bottom: 4px;">HO NET IMPACT</span>
            <span id="header-ho-total" style="font-size: 16px; font-weight: 800; color: #f19eb5;">₹ 0.00 L</span>
        </div>
        <div style="text-align: left;">
            <span style="font-size: 10px; color: #94a3b8; font-weight: 700; display: block; margin-bottom: 4px;">GROUP NET EBITDA</span>
            <span id="header-final-net" style="font-size: 24px; font-weight: 900; color: #92d050;">₹ 0.00 L</span>
        </div>
    </div>

    <div style="text-align: center; flex: 2;">
        <h1 style="margin:0; font-size: 18px; letter-spacing: 1px;">ROONGTA GROUP | HO MASTER SUMMARY</h1>
        <p style="margin:5px 0 0; color: #94a3b8; font-size: 10px; font-weight: 600;">LOCKED TO ACTUAL DATA ONLY</p>
    </div>

    <div class="controls" style="display: flex; gap: 10px; align-items: center; justify-content: flex-end; flex: 1.5;">
        <select id="fySelect" onchange="refreshHOData()" style="padding: 8px; border-radius: 6px; font-weight: 700; background: white; color: #0f172a; border:none;">
            <option value="2025">FY 2025-26</option>
            <option value="2026">FY 2026-27</option>
        </select>
        <button onclick="saveHO()" style="background:#059669; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:700;">SAVE</button>
        <button onclick="window.location.href='index.html'" style="background:#475569; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">BACK</button>
    </div>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr id="hRow"><th class="sticky-col">FINANCIAL PARTICULARS</th></tr>
        </thead>
        <tbody id="tBody"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://roongta-cinemas-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const months = ["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];

    // Revenue Sections
    const revenueSections = [{
        id: 'ho_rev',
        title: 'HO ADDITIONAL REVENUES',
        rows: [
            { id: 'rev_bus', label: 'BUSINESS REVENUE' },
            { id: 'rev_vpf', label: 'VPF REVENUE' },
            { id: 'rev_oth_ho', label: 'OTHERS REVENUE' }
        ]
    }];

    // Expense Sections
    const expenseSections = [{
        id: 'ho_exp',
        title: 'HO OPERATING EXPENSES',
        rows: [
            { id: 'exp_sal', label: 'HO SALARY' },
            { id: 'exp_off', label: 'OFFICE EXPENSES' },
            { id: 'exp_oth', label: 'OTHER EXPENSES' }
        ]
    }];

    function initHO() {
        const h = document.getElementById('hRow');
        const b = document.getElementById('tBody');
        b.innerHTML = ""; 
        h.innerHTML = '<th class="sticky-col">FINANCIAL PARTICULARS</th>';
        months.forEach(m => h.innerHTML += `<th>${m}</th>`);
        h.innerHTML += `<th class="year-col">FY TOTAL</th>`;

        // 1. TOP ROW: TOTAL CINEMAS EBITDA
        b.innerHTML += renderRow({ id: 'cinema_ebitda', label: 'TOTAL CINEMAS EBITDA', type: 'calc', cls: 'h-rev-gross' });

        // 2. REVENUE SECTION (Collapsible)
        revenueSections.forEach(sec => {
            b.innerHTML += `<tr class="group-header" onclick="toggleSec('${sec.id}')">
                <td class="sticky-col"><span class="toggle-btn" id="btn_${sec.id}">−</span> ${sec.title}</td>
                <td colspan="13"></td></tr>`;
            sec.rows.forEach(r => b.innerHTML += renderRow(r, sec.id));
            b.innerHTML += renderRow({ id: 'total_ho_rev', label: 'TOTAL HO REVENUE', type: 'summary', cls: 'h-rev-gross' });
        });

        // 3. EXPENSE SECTION (Collapsible)
        expenseSections.forEach(sec => {
            b.innerHTML += `<tr class="group-header" onclick="toggleSec('${sec.id}')">
                <td class="sticky-col"><span class="toggle-btn" id="btn_${sec.id}">−</span> ${sec.title}</td>
                <td colspan="13"></td></tr>`;
            sec.rows.forEach(r => b.innerHTML += renderRow(r, sec.id));
            b.innerHTML += renderRow({ id: 'total_ho_exp', label: 'TOTAL HO EXPENSES', type: 'summary', cls: 'h-exp' });
        });

        // 4. FINAL CALCULATION: (Cinemas + HO Rev) - HO Exp
        b.innerHTML += renderRow({ id: 'final_ebitda', label: 'FINAL GROUP EBITDA (NET)', type: 'summary', cls: 'h-ebitda' });
        
        refreshHOData();
    }

    function renderRow(r, secId) {
        let cls = r.cls || "";
        if (secId) cls += ` row_${secId}`; 
        let html = `<tr class="${cls}"><td class="sticky-col">${r.label}</td>`;
        for(let i=0; i <= 12; i++) {
            let isRO = (r.id === 'cinema_ebitda' || i === 12 || r.type === 'summary' || r.type === 'calc');
            // Change this line inside the renderRow function:
html += `<td class="${i===12?'year-col':''}">
    <input type="number" id="${r.id}_${i}" value="0" ${isRO?'readonly class="calc-field"':''} oninput="calcHO()">
</td>`;
        }
        return html + '</tr>';
    }

    function toggleSec(id) {
        const rows = document.querySelectorAll(`.row_${id}`);
        const btn = document.getElementById(`btn_${id}`);
        const isHidden = rows[0].style.display === 'none';
        rows.forEach(r => r.style.display = isHidden ? 'table-row' : 'none');
        btn.innerText = isHidden ? '−' : '+';
    }

    async function refreshHOData() {
    const fy = document.getElementById('fySelect').value;
    const locations = ['surat', 'ghaziabad', 'muzaffarnagar', 'adipur', 'hyderabad'];
    
    // 1. Fetch all report data from Firebase
    const snapshot = await db.ref('reports').once('value');
    const all = snapshot.val() || {};

    // 2. Calculate Monthly Cinema Totals
    for (let i = 0; i < 12; i++) {
        let totalCin = 0;
        locations.forEach(loc => {
            const d = all[loc]?.['actual']?.[fy];
            if (d) {
                const ff = parseFloat(d.ff?.[i] || 0);
                const core = (ff * (parseFloat(d.atp_g?.[i] || 0) + parseFloat(d.sph_g?.[i] || 0))) / 100000;
                let o = 0; 
                ['rev_oth','rev_3d','rev_park','rev_mgmt','rev_adv'].forEach(k => o += parseFloat(d[k]?.[i] || 0));
                
                let e = 0; 
                Object.keys(d).forEach(k => { 
                    if(!['ff','atp_g','sph_g','atp_n','sph_n','rev_oth','rev_3d','rev_park','rev_mgmt','rev_adv','cap','occ'].includes(k) && Array.isArray(d[k])) 
                        e += parseFloat(d[k][i] || 0); 
                });
                totalCin += (core + o - e);
            }
        });
        document.getElementById(`cinema_ebitda_${i}`).value = totalCin.toFixed(2);
    }

    // 3. Calculate the Yearly Total for Cinemas (Column 12)
    let cinYearly = 0;
    for(let m = 0; m < 12; m++) {
        cinYearly += parseFloat(document.getElementById(`cinema_ebitda_${m}`).value) || 0;
    }
    document.getElementById(`cinema_ebitda_12`).value = cinYearly.toFixed(2);

    // 4. Fetch and Fill HO specific data
    const hoSnap = await db.ref(`reports/HO/actual/${fy}`).once('value');
    const hoData = hoSnap.val() || {};
    
    [...revenueSections[0].rows, ...expenseSections[0].rows].forEach(r => {
        if(hoData[r.id]) {
            hoData[r.id].forEach((v, idx) => {
                const el = document.getElementById(`${r.id}_${idx}`);
                if(el) el.value = v;
            });
        } else {
            // Reset to 0 if no data exists for this year
            for(let idx = 0; idx < 12; idx++) {
                const el = document.getElementById(`${r.id}_${idx}`);
                if(el) el.value = 0;
            }
        }
    });

    // 5. Trigger the main calculation engine to update Headers and Subtotals
    calcHO();
}

    function calcHO() {
    let yearlyCinemasTotal = 0;
    let yearlyHoRevTotal = 0;
    let yearlyHoExpTotal = 0;

    // Loop through all 12 months + the 13th column (FY TOTAL)
    for (let i = 0; i <= 12; i++) {
        
        // A. Update the FY TOTAL Column (Column index 12)
        if (i === 12) {
            const rowIds = ['cinema_ebitda', 'rev_bus', 'rev_vpf', 'rev_oth_ho', 'exp_sal', 'exp_off', 'exp_oth'];
            rowIds.forEach(id => {
                let rowSum = 0;
                // Sum months 0 to 11
                for(let m=0; m<12; m++) {
                    rowSum += parseFloat(document.getElementById(`${id}_${m}`).value) || 0;
                }
                document.getElementById(`${id}_12`).value = rowSum.toFixed(2);
            });
        }

        // B. Calculate Section Sub-Totals (Revenue and Expense)
        let hoRev = (parseFloat(document.getElementById(`rev_bus_${i}`).value) || 0) +
                    (parseFloat(document.getElementById(`rev_vpf_${i}`).value) || 0) +
                    (parseFloat(document.getElementById(`rev_oth_ho_${i}`).value) || 0);
        document.getElementById(`total_ho_rev_${i}`).value = hoRev.toFixed(2);

        let hoExp = (parseFloat(document.getElementById(`exp_sal_${i}`).value) || 0) +
                    (parseFloat(document.getElementById(`exp_off_${i}`).value) || 0) +
                    (parseFloat(document.getElementById(`exp_oth_${i}`).value) || 0);
        document.getElementById(`total_ho_exp_${i}`).value = hoExp.toFixed(2);

        // C. Calculate Final Row: (Cinemas + HO Rev) - HO Exp
        const cinEbitda = parseFloat(document.getElementById(`cinema_ebitda_${i}`).value) || 0;
        const netResult = (cinEbitda + hoRev) - hoExp;
        
        const finalEl = document.getElementById(`final_ebitda_${i}`);
        finalEl.value = netResult.toFixed(2);
        finalEl.style.color = netResult >= 0 ? "#166534" : "#991b1b";

        // D. Store Yearly Values for Header Summary
        if (i === 12) {
            yearlyCinemasTotal = cinEbitda;
            yearlyHoRevTotal = hoRev;
            yearlyHoExpTotal = hoExp;
        }
    }

    // 2. UPDATE UPPER LEFT HEADER SUMMARY
    const groupNetEbitda = (yearlyCinemasTotal + yearlyHoRevTotal) - yearlyHoExpTotal;
    const hoNetImpact = yearlyHoExpTotal - yearlyHoRevTotal;

    document.getElementById('header-cinemas-total').innerText = `₹ ${yearlyCinemasTotal.toFixed(2)} L`;
    document.getElementById('header-ho-total').innerText = `₹ ${hoNetImpact.toFixed(2)} L`;
    
    const hFinal = document.getElementById('header-final-net');
    hFinal.innerText = `₹ ${groupNetEbitda.toFixed(2)} L`;
    hFinal.style.color = groupNetEbitda >= 0 ? "#92d050" : "#f19eb5";
}

    async function saveHO() {
        const fy = document.getElementById('fySelect').value;
        const data = {};
        [...revenueSections[0].rows, ...expenseSections[0].rows].forEach(r => {
            data[r.id] = [];
            for(let i=0; i<12; i++) data[r.id].push(document.getElementById(`${r.id}_${i}`).value || "0");
        });
        await db.ref(`reports/HO/actual/${fy}`).set(data);
        alert("HO Data Saved!");
    }

    window.onload = initHO;
</script>
</body>
</html>
