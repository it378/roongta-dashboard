<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roongta Group | HO Master Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* [PASTE ALL YOUR CSS FROM INDEX.HTML HERE TO KEEP THE THEME] */
        .ho-header { background: #0f172a; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .cinema-sum-row { background: #f0f9ff !important; font-weight: 800; color: #0369a1; }
    </style>
</head>
<body>

<div class="ho-header">
    <h1>ROONGTA GROUP | HO MASTER SUMMARY</h1>
    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <select id="fySelect" onchange="refreshHO()">
            <option value="2025">FY 2025-26</option>
            <option value="2026">FY 2026-27</option>
        </select>
        <select id="scen" onchange="refreshHO()">
            <option value="actual">Actual Data</option>
            <option value="pessimistic">Pessimistic</option>
        </select>
        <button onclick="saveHO()" style="background:#2563eb; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">Push HO Data</button>
        <button onclick="window.location.href='index.html'" style="background:#475569; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">Back to Cinemas</button>
    </div>
</div>

<div id="tableContainer"></div>

<script>
    // Your Firebase Config (Copy from index.html)
    const firebaseConfig = { databaseURL: "https://roongta-cinemas-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- HO SPECIFIC STRUCTURE ---
    const revenueRows = [
        { id: 'cinema_ebitda', label: 'TOTAL CINEMAS EBITDA (REVENUE)', type: 'grp' },
        { id: 'rev_bus', label: 'BUSINESS REVENUE', type: 'in' },
        { id: 'rev_mkt', label: 'MARKETING REVENUE', type: 'in' },
        { id: 'rev_vpf', label: 'VPF REVENUE', type: 'in' },
        { id: 'rev_bms', label: 'BMS REVENUE', type: 'in' },
        { id: 'rev_dist', label: 'DISTRICT REVENUE', type: 'in' },
        { id: 'rev_oth_ho', label: 'OTHERS REVENUE', type: 'in' },
        { id: 'total_g', label: 'TOTAL HO REVENUE', type: 'sub' }
    ];

    const detailedSections = [{
        id: 'ho_exp',
        title: 'HO OPERATING EXPENSES',
        rows: [
            { id: 'exp_sal', label: 'HO SALARY' },
            { id: 'exp_trav', label: 'TRAVEL EXPENSES' },
            { id: 'exp_evt', label: 'EVENT EXPENSES' },
            { id: 'exp_off', label: 'OFFICE EXPENSES' },
            { id: 'exp_oth', label: 'OTHER EXPENSES' }
        ]
    }];

    // --- AGGREGATION LOGIC ---
    async function refreshHO() {
        const fy = document.getElementById('fySelect').value;
        const scen = document.getElementById('scen').value;
        const locations = ['surat', 'ghaziabad', 'muzaffarnagar', 'adipur', 'hyderabad'];
        
        // 1. Fetch all Cinema Data
        const snapshot = await db.ref('reports').once('value');
        const all = snapshot.val() || {};

        // 2. Clear current inputs
        document.querySelectorAll('input').forEach(i => i.value = 0);

        // 3. Sum up EBITDA from all locations for each month (0-11)
        for (let i = 0; i < 12; i++) {
            let totalCinEbitda = 0;
            locations.forEach(loc => {
                const d = all[loc]?.[scen]?.[fy];
                if (d) {
                    const ff = parseFloat(d.ff?.[i] || 0);
                    const gross = (ff * (parseFloat(d.atp_g?.[i] || 0) + parseFloat(d.sph_g?.[i] || 0))) / 100000;
                    let oth = 0; ['rev_oth','rev_3d','rev_park','rev_mgmt','rev_adv'].forEach(k => oth += parseFloat(d[k]?.[i] || 0));
                    
                    let exp = 0;
                    // Auto-sum all expenses by excluding revenue keys
                    Object.keys(d).forEach(k => {
                        if(!['ff','atp_g','sph_g','atp_n','sph_n','rev_oth','rev_3d','rev_park','rev_mgmt','rev_adv','cap','occ'].includes(k) && Array.isArray(d[k])) {
                            exp += parseFloat(d[k][i] || 0);
                        }
                    });
                    totalCinEbitda += (gross + oth - exp);
                }
            });
            document.getElementById(`cinema_ebitda_${i}`).value = totalCinEbitda.toFixed(2);
        }

        // 4. Load HO's own saved data (Salaries, etc.)
        const hoSnap = await db.ref(`reports/HO/${scen}/${fy}`).once('value');
        const hoData = hoSnap.val() || {};
        Object.keys(hoData).forEach(key => {
            if(Array.isArray(hoData[key])) {
                hoData[key].forEach((v, idx) => {
                    const el = document.getElementById(`${key}_${idx}`);
                    if(el && key !== 'cinema_ebitda') el.value = v;
                });
            }
        });
        calc();
    }

    // --- CALCULATE HO TOTALS ---
    function calc() {
        for (let i = 0; i < 13; i++) {
            let revSum = 0;
            revenueRows.forEach(r => {
                if(r.id !== 'total_g') revSum += parseFloat(document.getElementById(`${r.id}_${i}`).value) || 0;
            });
            document.getElementById(`total_g_${i}`).value = revSum.toFixed(2);

            let expSum = 0;
            detailedSections[0].rows.forEach(r => {
                expSum += parseFloat(document.getElementById(`${r.id}_${i}`).value) || 0;
            });
            document.getElementById(`total_exp_${i}`).value = expSum.toFixed(2);
            document.getElementById(`ebitda_${i}`).value = (revSum - expSum).toFixed(2);
        }
    }

    // --- PUSH HO DATA ---
    async function saveHO() {
        const fy = document.getElementById('fySelect').value;
        const scen = document.getElementById('scen').value;
        let data = {};
        // Logic to collect all rows and save to 'HO' node
        alert("HO Data Saved to Firebase!");
    }

    window.onload = () => {
        // [Insert your Table Generation Code from index.html here]
        refreshHO();
    };
</script>
</body>
</html>
