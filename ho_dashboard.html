<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roongta Group | HO Master Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --navy: #0f172a; --ebitda: #92d050; --rev-gross: #ffd966; --exp: #f19eb5; --group-yellow: #ffff00; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; font-size: 11px; }
        
        /* PASSWORD OVERLAY */
        #passOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .pass-card {
            background: white; padding: 40px; border-radius: 16px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 320px;
        }
        .pass-card input {
            width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #e2e8f0;
            border-radius: 8px; text-align: center; font-size: 20px; letter-spacing: 4px; outline: none;
        }
        
        /* DASHBOARD LAYOUT */
        .ho-header { background: #0f172a; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .table-wrap { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; min-width: 1200px; }
        th { background: #0f172a; color: white; padding: 12px; text-align: left; position: sticky; top: 0; z-index: 10; border: 1px solid #334155; }
        td { border: 1px solid #cbd5e1; padding: 6px; }
        /* Update the Sticky Column to inherit row color */
.sticky-col { 
    position: sticky; 
    left: 0; 
    background: inherit; /* Matches the row color */
    font-weight: 800; 
    min-width: 240px; 
    border-right: 2px solid #0f172a; 
    z-index: 5; 
}
        input { width: 100%; border: none; text-align: right; font-weight: 700; outline: none; background: transparent; padding: 4px 0; font-family: inherit; }
        .calc-field { background: rgba(255,255,255,0.05); }
        
        .group-header { background: var(--group-yellow); font-weight: 800; cursor: pointer; color: black; }
        .h-rev-gross { background: var(--rev-gross); }
        .h-exp { background: var(--exp); }
        /* Update FY TOTAL to inherit row color */
.year-col { 
    background: inherit !important; /* Removes the light blue */
    font-weight: 900; 
}

        /* UPPER PART: TOTAL CINEMAS EBITDA */
.upper-cinema-total {
    background-color: #0f172a !important; 
    color: #ffffff !important;           
}
/* Ensure all cells in this row are Navy */
.upper-cinema-total td, .upper-cinema-total .sticky-col {
    background-color: #0f172a !important;
    color: #ffffff !important;
    border: 1px solid #475569 !important;
    padding: 10px 6px !important;
}

/* LOWER PART: FINAL GROUP EBITDA */
.lower-final-net {
    background-color: #92d050 !important; 
    color: #000000 !important;           
}
/* Ensure all cells in this row are Green */
.lower-final-net td, .lower-final-net .sticky-col {
    background-color: #92d050 !important;
    color: #000000 !important;
    border: 2px solid #000000 !important;
    padding: 15px 6px !important;
}
    </style>
</head>
<body>

<div id="passOverlay">
    <div class="pass-card">
        <h2 style="color:#0f172a; margin:0; font-size: 20px;">HO MASTER ACCESS</h2>
        <p style="color:#64748b; font-size:11px; margin-top:5px;">Enter Private Password to Continue</p>
        <input type="password" id="masterPassInput" placeholder="••••" onkeydown="if(event.key==='Enter') checkPass()">
        <button onclick="checkPass()" style="width:100%; background:#0f172a; color:white; padding:12px; border-radius:8px; border:none; cursor:pointer; font-weight:700;">UNLOCK DASHBOARD</button>
    </div>
</div>

<div class="ho-header">
    <div style="display: flex; gap: 20px; align-items: center; flex: 2;">
        <div style="background: #1e293b; padding: 10px 15px; border-radius: 8px; border: 1px solid #334155;">
            <span style="font-size: 9px; color: #94a3b8; display: block; font-weight: 800;">CINEMAS TOTAL</span>
            <span id="header-cinemas-total" style="font-size: 18px; font-weight: 900; color: #ffffff;">₹ 0.00 L</span>
        </div>
        <div style="border-right: 1px solid #334155; padding-right: 15px;">
            <span style="font-size: 9px; color: #94a3b8; display: block;">HO NET IMPACT</span>
            <span id="header-ho-total" style="font-size: 15px; font-weight: 800; color: #f19eb5;">₹ 0.00 L</span>
        </div>
        <div id="header-final-box" style="background: #92d050; padding: 10px 15px; border-radius: 8px; border: 2px solid #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
            <span style="font-size: 9px; color: #000000; display: block; font-weight: 800;">GROUP NET EBITDA</span>
            <span id="header-final-net" style="font-size: 26px; font-weight: 900; color: #000000;">₹ 0.00 L</span>
        </div>
    </div>

    <div style="text-align: center; flex: 2;">
        <h1 style="margin:0; font-size: 16px;">ROONGTA GROUP | HO MASTER SUMMARY</h1>
        <p style="margin:2px 0 0; color: #94a3b8; font-size: 9px;">LOCKED TO ACTUAL DATA ONLY</p>
    </div>

    <div style="display: flex; gap: 8px; justify-content: flex-end; flex: 1.5;">
        <select id="fySelect" onchange="refreshHOData()" style="padding: 6px; border-radius: 6px; font-weight: 700;">
            <option value="2025">FY 2025-26</option>
            <option value="2026">FY 2026-27</option>
        </select>
        <button onclick="saveHO()" style="background:#059669; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:700;">SAVE</button>
        <button onclick="window.location.href='index.html'" style="background:#475569; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer;">BACK</button>
    </div>
</div>

<div class="table-wrap">
    <table>
        <thead><tr id="hRow"></tr></thead>
        <tbody id="tBody"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://roongta-cinemas-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const months = ["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];
    const revenueRows = [
        { id: 'rev_bus', label: 'BUSINESS REVENUE' },
        { id: 'rev_vpf', label: 'VPF REVENUE' },
        { id: 'rev_oth_ho', label: 'OTHERS REVENUE' }
    ];
    const expenseRows = [
        { id: 'exp_sal', label: 'HO SALARY' },
        { id: 'exp_off', label: 'OFFICE EXPENSES' },
        { id: 'exp_oth', label: 'OTHER EXPENSES' }
    ];

    function checkPass() {
        const pass = document.getElementById('masterPassInput').value;
        if (pass === "RCINEMAHO") { 
            document.getElementById('passOverlay').style.display = 'none';
            initHO();
        } else {
            alert("Wrong Password!");
        }
    }

    function initHO() {
        const h = document.getElementById('hRow');
        const b = document.getElementById('tBody');
        h.innerHTML = '<th class="sticky-col">FINANCIAL PARTICULARS</th>' + months.map(m => `<th>${m}</th>`).join('') + '<th class="year-col">FY TOTAL</th>';
        
        b.innerHTML += renderRow({ id: 'cinema_ebitda', label: 'TOTAL CINEMAS EBITDA', cls: 'upper-cinema-total', isRO: true });
        
        b.innerHTML += `<tr class="group-header" onclick="toggleSec('ho_rev')"><td class="sticky-col"><span id="btn_ho_rev">−</span> HO ADDITIONAL REVENUES</td><td colspan="13"></td></tr>`;
        revenueRows.forEach(r => b.innerHTML += renderRow(r, 'ho_rev'));
        b.innerHTML += renderRow({ id: 'total_ho_rev', label: 'TOTAL HO REVENUE', cls: 'h-rev-gross', isRO: true });

        b.innerHTML += `<tr class="group-header" onclick="toggleSec('ho_exp')"><td class="sticky-col"><span id="btn_ho_exp">−</span> HO OPERATING EXPENSES</td><td colspan="13"></td></tr>`;
        expenseRows.forEach(r => b.innerHTML += renderRow(r, 'ho_exp'));
        b.innerHTML += renderRow({ id: 'total_ho_exp', label: 'TOTAL HO EXPENSES', cls: 'h-exp', isRO: true });

        b.innerHTML += renderRow({ id: 'final_ebitda', label: 'FINAL GROUP EBITDA (NET)', cls: 'lower-final-net', isRO: true });
        
        refreshHOData();
    }

    function renderRow(r, sec) {
        let html = `<tr class="${r.cls || ''} ${sec ? 'row_'+sec : ''}"><td class="sticky-col">${r.label}</td>`;
        for(let i=0; i<=12; i++) {
            const isRO = r.isRO || i === 12;
            html += `<td class="${i===12?'year-col':''}"><input type="number" id="${r.id}_${i}" value="0" ${isRO?'readonly class="calc-field"':'oninput="calcHO()" '}></td>`;
        }
        return html + '</tr>';
    }

    function toggleSec(id) {
        const rows = document.querySelectorAll(`.row_${id}`);
        const isHidden = rows[0].style.display === 'none';
        rows.forEach(r => r.style.display = isHidden ? 'table-row' : 'none');
        document.getElementById('btn_'+id).innerText = isHidden ? '−' : '+';
    }

    async function refreshHOData() {
        const fy = document.getElementById('fySelect').value;
        const snapshot = await db.ref('reports').once('value');
        const all = snapshot.val() || {};
        const locations = ['surat', 'ghaziabad', 'muzaffarnagar', 'adipur', 'hyderabad'];

        for (let i = 0; i < 12; i++) {
            let totalCin = 0;
            locations.forEach(loc => {
                const d = all[loc]?.['actual']?.[fy];
                if (d) {
                    const ff = parseFloat(d.ff?.[i] || 0);
                    const core = (ff * (parseFloat(d.atp_g?.[i] || 0) + parseFloat(d.sph_g?.[i] || 0))) / 100000;
                    let o = 0; ['rev_oth','rev_3d','rev_park','rev_mgmt','rev_adv'].forEach(k => o += parseFloat(d[k]?.[i] || 0));
                    let e = 0; Object.keys(d).forEach(k => { if(!['ff','atp_g','sph_g','atp_n','sph_n','rev_oth','rev_3d','rev_park','rev_mgmt','rev_adv','cap','occ'].includes(k) && Array.isArray(d[k])) e += parseFloat(d[k][i] || 0); });
                    totalCin += (core + o - e);
                }
            });
            document.getElementById(`cinema_ebitda_${i}`).value = totalCin.toFixed(2);
        }

        const hoSnap = await db.ref(`reports/HO/actual/${fy}`).once('value');
        const hoData = hoSnap.val() || {};
        [...revenueRows, ...expenseRows].forEach(r => {
            if(hoData[r.id]) hoData[r.id].forEach((v, idx) => { if(document.getElementById(`${r.id}_${idx}`)) document.getElementById(`${r.id}_${idx}`).value = v; });
        });
        calcHO();
    }

    function calcHO() {
        for (let i = 0; i <= 12; i++) {
            if (i === 12) {
                ['cinema_ebitda', ...revenueRows.map(r=>r.id), ...expenseRows.map(r=>r.id)].forEach(id => {
                    let sum = 0; for(let m=0; m<12; m++) sum += parseFloat(document.getElementById(`${id}_${m}`).value) || 0;
                    document.getElementById(`${id}_12`).value = sum.toFixed(2);
                });
            }
            let rev = 0; revenueRows.forEach(r => rev += parseFloat(document.getElementById(`${r.id}_${i}`).value) || 0);
            document.getElementById(`total_ho_rev_${i}`).value = rev.toFixed(2);
            
            let exp = 0; expenseRows.forEach(r => exp += parseFloat(document.getElementById(`${r.id}_${i}`).value) || 0);
            document.getElementById(`total_ho_exp_${i}`).value = exp.toFixed(2);

            const cin = parseFloat(document.getElementById(`cinema_ebitda_${i}`).value) || 0;
            const net = (cin + rev) - exp;
            document.getElementById(`final_ebitda_${i}`).value = net.toFixed(2);

            if (i === 12) {
                document.getElementById('header-cinemas-total').innerText = `₹ ${cin.toFixed(2)} L`;
                document.getElementById('header-ho-total').innerText = `₹ ${(exp - rev).toFixed(2)} L`;
                
                const finalBox = document.getElementById('header-final-box');
                const finalText = document.getElementById('header-final-net');
                finalText.innerText = `₹ ${net.toFixed(2)} L`;
                
                if(net >= 0) {
                    finalBox.style.backgroundColor = "#92d050";
                } else {
                    finalBox.style.backgroundColor = "#f19eb5";
                }
            }
        }
    }

    async function saveHO() {
        const fy = document.getElementById('fySelect').value;
        const data = {};
        [...revenueRows, ...expenseRows].forEach(r => {
            data[r.id] = []; for(let i=0; i<12; i++) data[r.id].push(document.getElementById(`${r.id}_${i}`).value || "0");
        });
        await db.ref(`reports/HO/actual/${fy}`).set(data);
        alert("Data Saved Successfully!");
    }
</script>
</body>
</html>
